schema_version: 1.0.0
defaults:
  timeout_seconds: 15
  maximum_retries: 2
  retry_backoff_seconds: [1, 3]
  failure_mode: FAIL_CLOSED
  message_schema: AgentMessage@1.0.0
agents:
  equity-market-scanner:
    enabled: true
    schedule: "*/5 14-21 * * 1-5"
    outputs: [ScannerCandidate]
  crypto-market-scanner:
    enabled: true
    schedule: "*/5 * * * *"
    outputs: [ScannerCandidate]
  technical-analyst:
    enabled: true
    outputs: [TechnicalAssessment]
  fundamental-quality-analyst:
    enabled: true
    outputs: [FundamentalAssessment]
  news-event-risk-analyst:
    enabled: false
    reason: reliable source connector not configured
  day-trading-strategy-agent:
    enabled: false
    reason: strategies remain RESEARCH
  long-term-investment-agent:
    enabled: false
    reason: strategies remain RESEARCH
  strategy-allocator:
    enabled: true
  portfolio-manager:
    enabled: true
  deterministic-risk-engine:
    enabled: true
    retries: 0
  execution-agent:
    enabled: true
    accepted_modes: [PAPER, SHADOW]
  position-exit-monitor:
    enabled: true
  auditor-communication-reporter:
    enabled: true
