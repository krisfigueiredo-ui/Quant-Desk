services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: quant_desk
      POSTGRES_USER: quant_desk
      POSTGRES_PASSWORD: local-development-only
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quant_desk"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - quant_desk_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - quant_desk_redis:/data

volumes:
  quant_desk_postgres:
  quant_desk_redis:
